<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>   {% block title %}Base{% endblock title %}</title>
    <style>

        nav{
            background-color: #333;
            color: white;
            padding:10px ;
        }

        nav ul{
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        nav li{
            float: left;
        }

        nav li a{
            color: white;
            display: block;
            text-align: center;
            text-decoration: none;
            padding: 10px ;
        }

        nav li a:hover{
            background-color: aliceblue;
            color: black;
        }

        h1,h2,h3,h4{
            margin: 20px;
            text-align: center;
        }

        table{
            width: 100%;
        }

        th , td{
            border: 2px solid black;
            padding: 8px;
            text-align: left;
        }

        th{
            font-size: 30px;
            background-color: bisque;
        }

        form{
            margin-top: 20px;
            margin-bottom: 300px;
            max-width: 400px;
            padding: 20px;
            margin: auto;
            border: 1px solid black;
            border-radius: 10px;
        }

        label{
            display: block;
            margin-bottom: 5px;
            
        }

        input[type = "text"],
        input[type = "password"],
        input[type = "email"],
        input[type = "date"],
        input[type = "file"],
        textarea,
        select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid red;
            border-radius: 20px;

        }

        button{
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
        }

        button:hover{
background-color: red;
cursor: pointer;
        }
        {% block css %}
        {% endblock css %}

    </style>

</head>
<body>

    <nav>
        <ul>
            
            {% if request.session.email %}
                <li><a href="{% url "dashboard" %}">Home</a></li>
                <li><a href="{% url "update_profile" %}">Update Profile</a></li>
                <li><a href="{% url "logout" %}">Logout</a></li>
            {% else %}
            <li><a href="{% url "index" %}">Home</a></li>
            <li><a href="{% url "register" %}">Register</a></li>
                <li><a href="{% url "login" %}">Login</a></li>
            {% endif %}
        </ul>
    </nav>


{% block content %}


{% endblock content %}


</body>
</html>
